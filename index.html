<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>E1M1</title>
    <style>
        body {
                display: flex;
                min-height: 100%;
                justify-content: center;
                align-items: center;
                background: black;
                height: 100dvh;
                margin: 0;
                padding: 0;
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
                background-image: url('https://steamuserimages-a.akamaihd.net/ugc/1666860330145760698/94C511E8811AA0551276DA0EB55EE98665EE00AB/');
        }
        
        #video-player {
                display: none;
                width: 100%;
                height: 100%;
        }

        @keyframes pulse {
                0%, 100% {
                    opacity: 1;
                    transform: translate(-50%, -50%) scale(1);
                }
                50% {
                    opacity: 0.7;
                    transform: translate(-50%, -50%) scale(1.05);
                }
        }

        .play-btn {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                max-width: 250px;
                width: 100%;
                height: 250px;
                z-index: 1;
                animation: pulse 2s infinite;
                cursor: pointer;
        }
        </style>
  </head>
  <body>
    <svg class="play-btn" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <rect x="20" y="20" width="160" height="160" fill="#8B0000" stroke="#FF0000" stroke-width="4"/>
        <rect x="25" y="25" width="150" height="150" fill="#CC0000"/>
        <rect x="35" y="35" width="130" height="130" fill="#990000"/>
        <polygon points="75,65 75,135 135,100" fill="#FFFF00" stroke="#FFD700" stroke-width="2" stroke-linejoin="round"/>

        <rect x="20" y="20" width="15" height="15" fill="#FF0000"/>
        <rect x="165" y="20" width="15" height="15" fill="#FF0000"/>
        <rect x="20" y="165" width="15" height="15" fill="#FF0000"/>
        <rect x="165" y="165" width="15" height="15" fill="#FF0000"/>
    </svg>
 
    <div id="video-player"></div>
    <script type="module">
        import YouTubePlayer from 'https://cdn.jsdelivr.net/npm/youtube-player@5.6.0/+esm';
        
        let videoIds = ['qsjHbxVI3EI', 'IqnZgCSwOsw'];

        const player = YouTubePlayer('video-player', {
            width: window.innerWidth,
            height: window.innerHeight,
            videoId: videoIds[0],
            playerVars: {
                fs: 1,
                modestbranding: 1,
                rel: 0,
                controls: 1
            }
        });
        
        const logo = document.querySelector('.play-btn');

        logo.addEventListener('click', () => {
            document.querySelector('#video-player').style.display = 'flex';
            logo.style.display = 'none';
            player.playVideo();
        });

        player.on('stateChange', (event) => {
            if (event.data === 0) {
                videoIds.reverse();

                player.loadVideoById(videoIds[0]);
            }
        });
    </script>
  </body>
</html>
